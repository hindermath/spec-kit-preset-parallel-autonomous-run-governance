schema_version: "1.0"

preset:
  id: "parallel-autonomous-run-governance"
  name: "Parallel Autonomous Run Governance"
  version: "0.2.3"
  description: "Coordinates isolated autonomous campaigns and optionally gates worker scheduling on a current campaign intake review."
  author: "Thorsten Hindermann"
  repository: "https://github.com/hindermath/spec-kit-preset-parallel-autonomous-run-governance"
  license: "MIT"

requires:
  speckit_version: ">=0.8.3"

provides:
  templates:
    - type: "template"
      name: "parallel-campaign-template"
      file: "templates/parallel-campaign-template.json"
      description: "Portable parallel autonomous campaign manifest"
    - type: "template"
      name: "parallel-runner-profiles-template"
      file: "templates/parallel-runner-profiles-template.json"
      description: "Local executable and argument-array runner bindings"
    - type: "template"
      name: "parallel-runner-profiles-examples"
      file: "templates/parallel-runner-profiles-examples.json"
      description: "Agent-neutral local profile examples for supported CLI runner families"
    - type: "template"
      name: "parallel-campaign-state-template"
      file: "templates/parallel-campaign-state-template.json"
      description: "Aggregate resumable campaign state"
    - type: "template"
      name: "parallel-worker-result-template"
      file: "templates/parallel-worker-result-template.json"
      description: "Machine-readable worker result contract"
    - type: "template"
      name: "parallel-autonomous-runbook-template"
      file: "templates/parallel-autonomous-runbook-template.md"
      description: "Campaign runbook and permission boundaries"
    - type: "template"
      name: "parallel-autonomous-evidence-template"
      file: "templates/parallel-autonomous-evidence-template.md"
      description: "Campaign evidence and consolidation ledger"
    - type: "template"
      name: "parallel-autonomous-retrospective-template"
      file: "templates/parallel-autonomous-retrospective-template.md"
      description: "Portable campaign retrospective"
    - type: "template"
      name: "parallel-autonomous-agent-guidance-addendum-template"
      file: "templates/agent-file-addendum.md"
      description: "Agent-neutral parallel campaign guidance"
    - type: "command"
      name: "speckit.parallel-autonomous"
      file: "commands/speckit.parallel-autonomous.md"
      description: "Validate and execute a bounded parallel autonomous campaign"
    - type: "command"
      name: "speckit.parallel-autonomous-status"
      file: "commands/speckit.parallel-autonomous-status.md"
      description: "Inspect parallel campaign and worker state"
    - type: "command"
      name: "speckit.parallel-autonomous-stop"
      file: "commands/speckit.parallel-autonomous-stop.md"
      description: "Request a cooperative campaign stop"
    - type: "command"
      name: "speckit.parallel-autonomous-resume"
      file: "commands/speckit.parallel-autonomous-resume.md"
      description: "Resume after campaign and worker revalidation"
    - type: "command"
      name: "speckit.parallel-autonomous-consolidate"
      file: "commands/speckit.parallel-autonomous-consolidate.md"
      description: "Consolidate ready results under explicit authority"

tags:
  - "parallel"
  - "autonomous"
  - "governance"
  - "orchestration"
  - "worktree"
  - "pipeline"
  - "concurrency"
  - "evidence"
  - "permissions"
